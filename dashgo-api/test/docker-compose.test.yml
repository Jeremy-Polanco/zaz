services:
  postgres-test:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: dashgo_test
      POSTGRES_USER: dashgo_test
      POSTGRES_PASSWORD: dashgo_test
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dashgo_test -d dashgo_test"]
      interval: 1s
      timeout: 5s
      retries: 30
