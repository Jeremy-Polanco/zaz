name: Tests

on:
  pull_request:
  push:
    branches: [main]

# ── Gate policy ───────────────────────────────────────────────────────────
# BLOCKING (no continue-on-error): build + unit tests for the two DEPLOYED
#   apps (api, web). Verified green (api: 620 unit, web: 195 unit) and they
#   gate every merge into `main` via branch protection. A red here = no merge
#   = nothing reaches the auto-deploying branch.
# INFORMATIONAL (continue-on-error): integration, e2e, mobile, coverage. They
#   run for visibility but don't block yet — integration/e2e need external
#   creds and mobile ships via EAS (not this deploy path). Promote to blocking
#   once each is reliably green in CI.

jobs:
  api-tests:
    name: Backend (dashgo-api)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashgo-api
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: dashgo_test
          POSTGRES_USER: dashgo_test
          POSTGRES_PASSWORD: dashgo_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dashgo-api/package-lock.json
      - run: npm ci
      # ── BLOCKING gate — must pass to merge ──────────────────────────
      - name: Build (blocking)
        run: npm run build
      - name: Unit tests (blocking)
        run: npm test
      # ── BLOCKING gate — a broken migration must never reach `main`, because
      #   the runtime DataSource has migrationsRun:true and applies migrations
      #   on boot during the DO deploy. A migration that fails here = failed
      #   boot in prod = downtime. Apply every migration against a clean DB so
      #   bad SQL is caught at PR time, before it can deploy. ───────────────
      - name: Migrations apply on a clean DB (blocking)
        env:
          DB_HOST: localhost
          DB_PORT: 5433
          DB_NAME: dashgo_test
          DB_USER: dashgo_test
          DB_PASSWORD: dashgo_test
          DB_SSL: 'false'
        run: npm run migration:run
      # ── Informational — runs for visibility, won't block the merge ──
      - name: Integration tests (informational)
        env:
          DB_HOST: localhost
          DB_PORT: 5433
          DB_NAME: dashgo_test
          DB_USER: dashgo_test
          DB_PASSWORD: dashgo_test
          JWT_SECRET: ci-test-secret-32-characters-long
          NODE_ENV: test
          STRIPE_SECRET_KEY: sk_test_dummy
          STRIPE_WEBHOOK_SECRET: whsec_test
          STRIPE_SUBSCRIPTION_PRICE_ID: price_test_monthly
          DB_SYNCHRONIZE: 'false'
        run: npm run test:integration
        continue-on-error: true
      - name: E2E tests (informational)
        env:
          DB_HOST: localhost
          DB_PORT: 5433
          DB_NAME: dashgo_test
          DB_USER: dashgo_test
          DB_PASSWORD: dashgo_test
          JWT_SECRET: ci-test-secret-32-characters-long
          NODE_ENV: test
          STRIPE_SECRET_KEY: sk_test_dummy
          STRIPE_WEBHOOK_SECRET: whsec_test
          STRIPE_SUBSCRIPTION_PRICE_ID: price_test_monthly
        run: npm run test:e2e
        continue-on-error: true
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-coverage
          path: dashgo-api/coverage
          retention-days: 7

  web-tests:
    name: Web (dashgo-web)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashgo-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dashgo-web/package-lock.json
      - run: npm ci
      # ── BLOCKING gate — this is literally what Vercel runs ──────────
      - name: Build (blocking)
        run: npm run build
      - name: Unit tests (blocking)
        run: npm test
      # ── Informational ──────────────────────────────────────────────
      - name: Coverage (informational)
        run: npm run test:cov
        continue-on-error: true
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-coverage
          path: dashgo-web/coverage
          retention-days: 7

  mobile-tests:
    name: Mobile (dashgo)
    runs-on: ubuntu-latest
    # Mobile ships via EAS, not this web+api deploy path — kept fully
    # informational so a mobile-only failure never blocks an api/web deploy.
    defaults:
      run:
        working-directory: dashgo
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dashgo/package-lock.json
      - run: npm ci
        continue-on-error: true
      - name: Run tests (informational)
        run: npm test
        continue-on-error: true
      - name: Run coverage (informational)
        run: npm run test:cov
        continue-on-error: true
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-coverage
          path: dashgo/coverage
          retention-days: 7
