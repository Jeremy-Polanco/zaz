# DigitalOcean App Platform spec for Zaz API + managed Postgres.
#
# ┌─────────────────────────────────────────────────────────────────────┐
# │ ⚠️  DO NOT run `doctl apps update --spec .do/app.yaml` lightly.     │
# │                                                                     │
# │ DO replaces ALL env vars with what's in this spec. Anything NOT in  │
# │ here gets WIPED from the dashboard. Anything in here OVERWRITES     │
# │ what the dashboard has — including encrypted secrets.               │
# │                                                                     │
# │ This file ONLY declares non-secret operational defaults and the     │
# │ DB-binding template tokens. Secrets and deploy-specific URLs        │
# │ (JWT_SECRET, STRIPE_*, TWILIO_*, SENTRY_DSN, CORS_ORIGIN,           │
# │ PUBLIC_WEB_URL) are managed EXCLUSIVELY in the DO dashboard.        │
# │                                                                     │
# │ For env var changes after initial creation, use:                    │
# │   - The DO dashboard (Apps → zaz → Settings → Components → api)     │
# │   - `doctl apps update <id> --env KEY=VALUE` (single var)           │
# │                                                                     │
# │ Code changes deploy automatically via `deploy_on_push: true`.       │
# │ Pushing to main triggers a rebuild that PRESERVES dashboard env.    │
# └─────────────────────────────────────────────────────────────────────┘
#
# Apply this once for the FIRST create only:
#   doctl apps create --spec .do/app.yaml
#
# After creation, set these in the dashboard:
#   JWT_SECRET                       (openssl rand -base64 48)
#   CORS_ORIGIN                      (Vercel URL, no trailing /)
#   PUBLIC_WEB_URL                   (Vercel URL, no trailing /)
#   STRIPE_SECRET_KEY                (sk_test_... or sk_live_...)
#   STRIPE_WEBHOOK_SECRET            (whsec_... after creating webhook)
#   STRIPE_SUBSCRIPTION_PRICE_ID     (price_...)
#   TWILIO_ACCOUNT_SID               (AC...)
#   TWILIO_API_KEY_SID               (SK...)
#   TWILIO_API_KEY_SECRET            (one-time at API key creation)
#   TWILIO_FROM_NUMBER               (E.164, e.g. +1...)
#   SENTRY_DSN                       (from Sentry project, optional)
#
# Stripe webhook URL after deploy:
#   https://<your-app>.ondigitalocean.app/api/payments/stripe/webhook

name: zaz
region: nyc

services:
  - name: api
    github:
      branch: main
      deploy_on_push: true
      repo: Jeremy-Polanco/zaz
    source_dir: zaz-api
    # NOTE: dockerfile_path is relative to the REPO ROOT (not to source_dir).
    # source_dir sets the build context; dockerfile_path locates the Dockerfile
    # in the git tree. Both must be specified independently.
    dockerfile_path: zaz-api/Dockerfile
    # Multi-stage Dockerfile — target the prod stage which only contains
    # dist + production deps.
    build_command: ""
    http_port: 3001
    instance_count: 1
    instance_size_slug: basic-xxs
    health_check:
      http_path: /api/health
      initial_delay_seconds: 15
      period_seconds: 30
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3
    routes:
      # preserve_path_prefix=true so DO does NOT strip /api before forwarding.
      # main.ts uses app.setGlobalPrefix('api'), so the container expects to
      # receive /api/* paths intact. Without this, requests to /api/health
      # would arrive at the container as /health and 404.
      - path: /api
        preserve_path_prefix: true
    envs:
      # ─── Runtime defaults — safe to ship in spec ─────────────────────
      - key: NODE_ENV
        scope: RUN_AND_BUILD_TIME
        value: production
      - key: API_PORT
        scope: RUN_AND_BUILD_TIME
        value: "3001"
      # ─── DB — bound from the managed-database resource below ─────────
      # These are template tokens, not real values; DO substitutes them at
      # runtime from the database resource. Safe to keep in spec.
      - key: DB_HOST
        scope: RUN_TIME
        value: ${zaz-db.HOSTNAME}
      - key: DB_PORT
        scope: RUN_TIME
        value: ${zaz-db.PORT}
      - key: DB_USER
        scope: RUN_TIME
        value: ${zaz-db.USERNAME}
      - key: DB_PASSWORD
        scope: RUN_TIME
        value: ${zaz-db.PASSWORD}
        type: SECRET
      - key: DB_NAME
        scope: RUN_TIME
        value: ${zaz-db.DATABASE}
      - key: DB_SSL
        scope: RUN_TIME
        value: "true"
      - key: DB_SYNCHRONIZE
        scope: RUN_TIME
        value: "false"
      # ─── JWT TTLs (not secret) ───────────────────────────────────────
      - key: JWT_ACCESS_TTL
        scope: RUN_TIME
        value: "1h"
      - key: JWT_REFRESH_TTL
        scope: RUN_TIME
        value: "30d"
      # ─── Auth bypass — temp while A2P 10DLC is being registered ──────
      # Inocuous defaults. Keep in spec so they're versioned & visible in
      # PRs; flip values via dashboard if needed without touching git.
      - key: AUTH_BYPASS_PHONES
        scope: RUN_TIME
        value: "+19172541473"
      - key: AUTH_BYPASS_OTP_CODE
        scope: RUN_TIME
        value: "000000"
      - key: AUTH_BOOTSTRAP_ADMIN_PHONES
        scope: RUN_TIME
        value: "+19172541473"
      # ─── Sentry sampling (DSN itself is in dashboard) ────────────────
      - key: SENTRY_TRACES_SAMPLE_RATE
        scope: RUN_TIME
        value: "0.1"
      #
      # ─── DASHBOARD-ONLY (do NOT add here) ─────────────────────────────
      # JWT_SECRET, CORS_ORIGIN, PUBLIC_WEB_URL,
      # STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET, STRIPE_SUBSCRIPTION_PRICE_ID,
      # TWILIO_ACCOUNT_SID, TWILIO_API_KEY_SID, TWILIO_API_KEY_SECRET,
      # TWILIO_FROM_NUMBER, SENTRY_DSN
      # ─────────────────────────────────────────────────────────────────

databases:
  - name: zaz-db
    engine: PG
    version: "16"
    production: false
    size: db-s-dev-database
    # Dev tier auto-generates db_name and db_user. DO exposes them via the
    # ${zaz-db.DATABASE} / ${zaz-db.USERNAME} / ${zaz-db.PASSWORD} / etc.
    # bindings already wired in the api component above.
